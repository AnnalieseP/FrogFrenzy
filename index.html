<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Frog Frenzy 🐸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#FFC7DD; --pink-dark:#FF9EC4; --pink-deep:#F5789F;
    --blue:#BEE7F9; --blue-dark:#93D3F2; --blue-deep:#5FB6E0;
    --green:#C7EFCB; --green-dark:#A3E3A9; --green-deep:#74CC80;
    --purple:#E1CFF7; --purple-dark:#CBA7EF; --purple-deep:#AC7CE0;
    --cream:#FFF8FB;
    --lake-top:#CDEFFB; --lake-bottom:#A9DFF2;
    --ink:#6B5B73;
    --ink-soft:#9A8AA0;
    --card:#FFFFFF;
    --shadow: 0 8px 20px rgba(180, 140, 180, 0.18);
    --food:#F3D9A4; --food-dark:#E3BE7A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0; padding:0; width:100%; height:100%; overflow:hidden; touch-action:manipulation;}
  body{
    font-family:'Quicksand', sans-serif;
    background:var(--cream);
    color:var(--ink);
    position:relative;
  }
  .screen{
    position:absolute; inset:0;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:100%; height:100%;
  }
  .screen.active{display:flex;}

  /* ---------- MENU SCREEN ---------- */
  #menu-screen{
    background: linear-gradient(180deg, #FFF3F8 0%, #FFF3F8 38%, var(--lake-top) 38%, var(--lake-bottom) 100%);
    overflow:hidden;
  }
  .sky-decor{
    position:absolute; top:6%; left:8%; font-size:28px; opacity:0.8; animation:drift 8s ease-in-out infinite;
  }
  .sky-decor.two{ top:10%; left:auto; right:10%; animation-delay:2s; font-size:22px;}
  .sky-decor.three{ top:4%; left:50%; font-size:18px; animation-delay:4s;}
  @keyframes drift{ 0%,100%{transform:translateY(0px);} 50%{transform:translateY(8px);} }

  .game-title{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:clamp(38px, 9vw, 64px);
    margin:0;
    margin-top:4vh;
    background:linear-gradient(90deg, var(--pink-deep), var(--purple-deep) 50%, var(--blue-deep));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-align:center;
    letter-spacing:1px;
    filter:drop-shadow(0 3px 0 rgba(255,255,255,0.7));
    position:relative;
    z-index:5;
  }
  .game-subtitle{
    font-family:'Quicksand', sans-serif;
    font-weight:600;
    color:var(--ink-soft);
    margin-top:-6px;
    font-size:clamp(13px, 3vw, 16px);
    letter-spacing:0.5px;
    position:relative;
    z-index:5;
  }

  .lake-wrap{
    position:absolute; bottom:0; left:0; width:100%; height:64%;
  }
  .lilypad{
    position:absolute;
    bottom:0;
    width:20vw; max-width:130px; min-width:80px;
    height:auto;
  }
  .ripple{
    position:absolute;
    border:2px solid rgba(255,255,255,0.55);
    border-radius:50%;
    left:50%; top:50%;
    transform:translate(-50%,-50%);
    animation:rippleOut 3.2s ease-out infinite;
    pointer-events:none;
  }
  @keyframes rippleOut{
    0%{width:20%; height:8%; opacity:0.7;}
    100%{width:180%; height:70%; opacity:0;}
  }
  .lilypad-hopper{
    position:absolute;
    left:50%;
    bottom:58%;
    width:62%;
    transform:translateX(-50%);
    animation:hop 3.4s ease-in-out infinite;
    transform-origin:bottom center;
  }
  @keyframes hop{
    0%, 100%{ transform:translateX(-50%) translateY(0) scale(1,1); }
    8%{ transform:translateX(-50%) translateY(-2px) scale(1.05,0.92); }
    18%{ transform:translateX(-50%) translateY(-38px) scale(0.95,1.05); }
    30%{ transform:translateX(-50%) translateY(0) scale(1.05,0.9); }
    36%{ transform:translateX(-50%) translateY(2px) scale(1,1); }
    100%{ transform:translateX(-50%) translateY(0) scale(1,1); }
  }

  .play-btn-wrap{
    position:relative; z-index:6;
    margin-top:3vh;
    display:flex; flex-direction:column; align-items:center; gap:10px;
  }
  .play-btn{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:clamp(22px, 5vw, 30px);
    color:#fff;
    background:linear-gradient(180deg, var(--pink-dark), var(--pink-deep));
    border:none;
    padding:16px 56px;
    border-radius:999px;
    box-shadow:0 6px 0 var(--pink-deep), 0 12px 22px rgba(245,120,159,0.35);
    cursor:pointer;
    letter-spacing:1px;
    transition:transform 0.12s ease, box-shadow 0.12s ease;
  }
  .play-btn:active{
    transform:translateY(4px);
    box-shadow:0 2px 0 var(--pink-deep), 0 6px 14px rgba(245,120,159,0.35);
  }
  .play-hint{
    font-size:12px;
    color:var(--ink-soft);
    font-weight:600;
  }

  /* ---------- GAME SCREEN ---------- */
  #game-screen{
    background:linear-gradient(180deg, #FFF4F9, #FBF0FF);
    justify-content:flex-start;
  }
  .topbar{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 14px 4px 14px;
    max-width:520px;
  }
  .icon-btn{
    width:42px; height:42px;
    border-radius:50%;
    background:#fff;
    border:none;
    box-shadow:var(--shadow);
    font-size:18px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    color:var(--pink-deep);
  }
  .pill{
    background:#fff;
    border-radius:999px;
    padding:8px 16px;
    box-shadow:var(--shadow);
    font-weight:700;
    font-family:'Baloo 2', sans-serif;
    font-size:15px;
    display:flex; align-items:center; gap:6px;
  }
  #timer-pill.low-time{ color:#E0567A; animation:pulse 0.6s infinite; }
  @keyframes pulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }

  .frog-row{
    display:flex;
    justify-content:center;
    gap:2vw;
    width:100%;
    max-width:520px;
    padding:6px 8px 2px 8px;
  }
  .frog-slot{
    display:flex;
    flex-direction:column;
    align-items:center;
    width:22%;
    position:relative;
  }
  .frog-holder{
    width:100%;
    aspect-ratio:1/1;
    position:relative;
  }
  .frog-holder svg{ width:100%; height:100%; overflow:visible; }
  .frog-holder.celebrate{ animation:frogJump 1.1s ease; }
  @keyframes frogJump{
    0%{ transform:translateY(0) rotate(0deg); }
    15%{ transform:translateY(-4px) rotate(-3deg); }
    35%{ transform:translateY(-46px) rotate(6deg); }
    55%{ transform:translateY(-4px) rotate(-4deg); }
    70%{ transform:translateY(-20px) rotate(3deg); }
    85%{ transform:translateY(0) rotate(0deg); }
    100%{ transform:translateY(0) rotate(0deg); }
  }
  .frog-holder.leaving{ animation:frogLeave 0.4s ease forwards; }
  @keyframes frogLeave{ to{ transform:translateY(-60px); opacity:0; } }
  .frog-holder.entering{ animation:frogEnter 0.45s ease; }
  @keyframes frogEnter{ from{ transform:translateY(24px); opacity:0; } to{ transform:translateY(0); opacity:1; } }

  .speech-bubble{
    position:absolute;
    top:-14px; left:50%;
    transform:translate(-50%,-100%) scale(0.6);
    background:#fff;
    border-radius:14px;
    padding:4px 10px;
    font-family:'Baloo 2', sans-serif;
    font-size:11px;
    font-weight:700;
    color:var(--pink-deep);
    box-shadow:var(--shadow);
    white-space:nowrap;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.2s ease, transform 0.2s ease;
    z-index:20;
  }
  .speech-bubble.show{ opacity:1; transform:translate(-50%,-100%) scale(1); }

  .bowl-holder{
    width:78%;
    margin-top:-6%;
  }
  .bowl-holder svg{ width:100%; height:auto; display:block; }

  .board-wrap{
    flex:1;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    min-height:0;
  }
  #board{
    position:relative;
    background:rgba(255,255,255,0.55);
    border-radius:22px;
    box-shadow:inset 0 2px 10px rgba(180,140,180,0.15);
  }
  .dot{
    position:absolute;
    border-radius:50%;
    transition: top 0.28s cubic-bezier(.4,1.4,.6,1), left 0.22s ease, transform 0.18s ease, opacity 0.25s ease;
    cursor:pointer;
    box-shadow: inset -4px -5px 8px rgba(0,0,0,0.07), inset 3px 4px 6px rgba(255,255,255,0.8), 0 3px 6px rgba(150,110,150,0.15);
  }
  .dot.selected{ transform:scale(1.14); box-shadow: inset -4px -5px 8px rgba(0,0,0,0.07), inset 3px 4px 6px rgba(255,255,255,0.8), 0 0 0 3px #fff, 0 0 0 6px var(--ink-soft); }
  .dot.pop{ transform:scale(0); opacity:0; }
  .dot.new{ opacity:0; }
  .dot-0{ background:radial-gradient(circle at 32% 28%, #fff, var(--pink) 45%, var(--pink-dark) 100%); }
  .dot-1{ background:radial-gradient(circle at 32% 28%, #fff, var(--blue) 45%, var(--blue-dark) 100%); }
  .dot-2{ background:radial-gradient(circle at 32% 28%, #fff, var(--green) 45%, var(--green-dark) 100%); }
  .dot-3{ background:radial-gradient(circle at 32% 28%, #fff, var(--purple) 45%, var(--purple-dark) 100%); }

  .score-pop{
    position:absolute;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:14px;
    color:var(--pink-deep);
    pointer-events:none;
    animation:scoreFloat 0.7s ease forwards;
    z-index:30;
  }
  @keyframes scoreFloat{ 0%{ transform:translateY(0); opacity:1;} 100%{ transform:translateY(-30px); opacity:0;} }

  /* ---------- OVERLAYS ---------- */
  .overlay{
    position:absolute; inset:0;
    background:rgba(107,91,115,0.35);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
  }
  .overlay.active{ display:flex; }
  .card{
    background:#fff;
    border-radius:28px;
    padding:30px 28px;
    max-width:340px;
    width:86%;
    text-align:center;
    box-shadow:0 14px 34px rgba(150,110,150,0.28);
  }
  .card h2{
    font-family:'Baloo 2', sans-serif;
    font-size:26px;
    margin:0 0 4px 0;
    color:var(--pink-deep);
  }
  .card p{ color:var(--ink-soft); font-weight:600; margin:4px 0 18px 0; font-size:14px;}
  .stat-row{
    display:flex; justify-content:space-around; margin-bottom:20px;
  }
  .stat{
    display:flex; flex-direction:column; align-items:center;
  }
  .stat .num{ font-family:'Baloo 2', sans-serif; font-size:28px; font-weight:700; color:var(--purple-deep); }
  .stat .lbl{ font-size:11px; color:var(--ink-soft); font-weight:700; text-transform:uppercase; letter-spacing:0.5px;}
  .card-btn{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:16px;
    color:#fff;
    border:none;
    padding:12px 0;
    border-radius:999px;
    width:100%;
    margin-bottom:10px;
    cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,0.08);
  }
  .card-btn.primary{ background:linear-gradient(180deg, var(--pink-dark), var(--pink-deep)); }
  .card-btn.secondary{ background:linear-gradient(180deg, #EDE3F5, var(--purple-dark)); color:var(--ink); }
  .card-btn:active{ transform:translateY(2px); }

  @media (max-width:380px){
    .card{ padding:22px 18px; }
  }
</style>
</head>
<body>

  <!-- MENU SCREEN -->
  <div id="menu-screen" class="screen active">
    <div class="sky-decor">☁️</div>
    <div class="sky-decor two">☁️</div>
    <div class="sky-decor three">✨</div>

    <h1 class="game-title">Frog Frenzy</h1>
    <div class="game-subtitle">a cozy lilypad matching game</div>

    <div class="play-btn-wrap">
      <button class="play-btn" onclick="startGame()">PLAY</button>
      <div class="play-hint">tap or click to match the dots 💕</div>
    </div>

    <div class="lake-wrap" id="lake-wrap"></div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <div class="topbar">
      <button class="icon-btn" onclick="requestQuit()">←</button>
      <div class="pill" id="timer-pill">⏰ <span id="timer-val">60</span>s</div>
      <div class="pill">🐸 <span id="fed-val">0</span></div>
    </div>

    <div class="frog-row" id="frog-row"></div>

    <div class="board-wrap">
      <div id="board"></div>
    </div>
  </div>

  <!-- QUIT CONFIRM OVERLAY -->
  <div class="overlay" id="quit-overlay">
    <div class="card">
      <h2>Leaving already?</h2>
      <p>Your froggy friends will miss you 🥺</p>
      <button class="card-btn primary" onclick="confirmQuit()">Yes, go to menu</button>
      <button class="card-btn secondary" onclick="closeQuit()">Keep playing</button>
    </div>
  </div>

  <!-- GAME OVER OVERLAY -->
  <div class="overlay" id="gameover-overlay">
    <div class="card">
      <h2 id="go-title">Time's up!</h2>
      <p id="go-msg">You did great today 🌸</p>
      <div class="stat-row">
        <div class="stat"><div class="num" id="go-fed">0</div><div class="lbl">Frogs Fed</div></div>
        <div class="stat"><div class="num" id="go-score">0</div><div class="lbl">Score</div></div>
      </div>
      <button class="card-btn primary" onclick="startGame()">Play Again</button>
      <button class="card-btn secondary" onclick="goToMenu()">Main Menu</button>
    </div>
  </div>

<script>
/* =========================================================
   FROG FRENZY — game logic
   ========================================================= */

const COLORS = ['pink','blue','green','purple'];
const COLOR_MAIN  = {pink:'#FFC7DD', blue:'#BEE7F9', green:'#C7EFCB', purple:'#E1CFF7'};
const COLOR_DARK  = {pink:'#FF9EC4', blue:'#93D3F2', green:'#A3E3A9', purple:'#CBA7EF'};
const COLOR_DEEP  = {pink:'#F5789F', blue:'#5FB6E0', green:'#74CC80', purple:'#AC7CE0'};

const COLS = 6;
const ROWS = 7;
const GAME_SECONDS = 60;
const FILL_PER_DOT = 9; // % bowl fill per matched dot

let board = [];        // board[r][c] = {id, color} | null
let cellSize = 48;
let idSeed = 1;
let selected = null;   // {r,c}
let inputLocked = true;
let domCache = new Map(); // id -> element
let timerInterval = null;
let secondsLeft = GAME_SECONDS;
let score = 0;
let frogsFed = 0;

let frogSlots = COLORS.map(c => ({ color:c, fill:0, celebrating:false }));

/* ---------------- Utility ---------------- */
function wait(ms){ return new Promise(res => setTimeout(res, ms)); }
function randColor(){ return Math.floor(Math.random()*COLORS.length); }
function newId(){ return idSeed++; }
function inBounds(r,c){ return r>=0 && r<ROWS && c>=0 && c<COLS; }

/* ---------------- Screens ---------------- */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ---------------- Menu lake scene ---------------- */
function buildLakeScene(){
  const wrap = document.getElementById('lake-wrap');
  wrap.innerHTML = '';
  const pads = [
    {left:'12%', width:'26vw', duration:'3.6s', delay:'0s', color:0},
    {left:'42%', width:'22vw', duration:'4.2s', delay:'1.1s', color:1},
    {left:'70%', width:'28vw', duration:'3.9s', delay:'0.5s', color:2},
    {left:'25%', width:'18vw', duration:'4.6s', delay:'2s', color:3, bottom:'2%'},
  ];
  pads.forEach(p => {
    const pad = document.createElement('div');
    pad.className = 'lilypad';
    pad.style.left = p.left;
    pad.style.width = p.width;
    if(p.bottom) pad.style.bottom = p.bottom;
    pad.innerHTML = `
      <div class="ripple"></div>
      <svg viewBox="0 0 100 40" style="position:relative; z-index:2;">
        <ellipse cx="50" cy="22" rx="48" ry="16" fill="#8FD9A0"/>
        <ellipse cx="50" cy="20" rx="48" ry="16" fill="#A6E6B4"/>
        <path d="M50 20 L78 8" stroke="#8FD9A0" stroke-width="3" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="lilypad-hopper" style="animation-duration:${p.duration}; animation-delay:${p.delay};">
        ${frogSVG(COLORS[p.color], 'idle')}
      </div>
    `;
    wrap.appendChild(pad);
  });
}

/* ---------------- Frog SVG ---------------- */
function frogSVG(colorName, mood){
  const main = COLOR_MAIN[colorName];
  const dark = COLOR_DARK[colorName];
  const deep = COLOR_DEEP[colorName];
  const happy = mood === 'happy';
  const eyes = happy ? `
      <path d="M22 33 Q29 26 36 33" stroke="#5b4a61" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M64 33 Q71 26 78 33" stroke="#5b4a61" stroke-width="4" fill="none" stroke-linecap="round"/>
    ` : `
      <circle cx="29" cy="33" r="10" fill="#fff"/>
      <circle cx="71" cy="33" r="10" fill="#fff"/>
      <circle cx="30" cy="34" r="5" fill="#5b4a61" class="pupil"/>
      <circle cx="72" cy="34" r="5" fill="#5b4a61" class="pupil"/>
      <circle cx="32" cy="32" r="1.6" fill="#fff"/>
      <circle cx="74" cy="32" r="1.6" fill="#fff"/>
    `;
  const mouth = happy ? `<ellipse cx="50" cy="60" rx="8" ry="7" fill="#c9607e"/>` :
    `<path d="M38 58 Q50 66 62 58" stroke="#5b4a61" stroke-width="3.4" fill="none" stroke-linecap="round"/>`;
  return `
  <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="50" cy="60" rx="38" ry="27" fill="${main}"/>
    <circle cx="29" cy="28" r="19" fill="${main}"/>
    <circle cx="71" cy="28" r="19" fill="${main}"/>
    <circle cx="29" cy="28" r="19" fill="none" stroke="${dark}" stroke-width="1"/>
    <circle cx="71" cy="28" r="19" fill="none" stroke="${dark}" stroke-width="1"/>
    ${eyes}
    <ellipse cx="20" cy="52" rx="7" ry="4.5" fill="${deep}" opacity="0.35"/>
    <ellipse cx="80" cy="52" rx="7" ry="4.5" fill="${deep}" opacity="0.35"/>
    ${mouth}
    <ellipse cx="50" cy="60" rx="38" ry="27" fill="none" stroke="${dark}" stroke-width="1.2" opacity="0.5"/>
  </svg>`;
}

/* ---------------- Bowl SVG ---------------- */
function bowlSVG(fillPct){
  const clampFill = Math.max(0, Math.min(100, fillPct));
  const h = 26; // interior height available for food
  const foodH = (clampFill/100) * h;
  const foodY = 46 - foodH;
  return `
  <svg viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <clipPath id="bowlClip-${Math.random().toString(36).slice(2,8)}">
        <path d="M18 20 Q50 34 82 20 L78 40 Q50 50 22 40 Z"/>
      </clipPath>
    </defs>
    <path d="M18 20 Q50 34 82 20 L78 40 Q50 50 22 40 Z" fill="#fff" stroke="#e8d9ee" stroke-width="2"/>
    <g>
      <rect x="18" y="${foodY}" width="64" height="${h+6}" fill="var(--food-fill, #F3D9A4)" opacity="${clampFill>0?1:0}"/>
      <ellipse cx="50" cy="${foodY}" rx="30" ry="5" fill="var(--food-fill-top, #F6E3B8)" opacity="${clampFill>0?1:0}"/>
    </g>
    <path d="M18 20 Q50 34 82 20 L78 40 Q50 50 22 40 Z" fill="none" stroke="#EAD9EE" stroke-width="2.4"/>
    <path d="M14 16 Q50 30 86 16" fill="none" stroke="#EAD9EE" stroke-width="3" stroke-linecap="round"/>
  </svg>`;
}

/* ---------------- Frog row (gameplay) ---------------- */
function renderFrogRow(){
  const row = document.getElementById('frog-row');
  row.innerHTML = '';
  frogSlots.forEach((slot, i) => {
    const el = document.createElement('div');
    el.className = 'frog-slot';
    el.innerHTML = `
      <div class="frog-holder" id="frog-holder-${i}">
        <div class="speech-bubble" id="speech-${i}">Ribbit~! 💕</div>
        ${frogSVG(slot.color, 'idle')}
      </div>
      <div class="bowl-holder" id="bowl-holder-${i}" style="--food-fill:${clipColorFor(slot.color)}">
        ${bowlSVG(slot.fill)}
      </div>
    `;
    row.appendChild(el);
  });
}
function clipColorFor(){ return '#F3D9A4'; }

function updateBowl(i){
  const holder = document.getElementById(`bowl-holder-${i}`);
  if(!holder) return;
  holder.innerHTML = bowlSVG(frogSlots[i].fill);
}

/* ---------------- Board build ---------------- */
function makeCell(){ return { id:newId(), color:randColor() }; }

function buildInitialBoard(){
  board = [];
  for(let r=0;r<ROWS;r++){
    const row = [];
    for(let c=0;c<COLS;c++){
      let color;
      let tries = 0;
      do{
        color = randColor();
        tries++;
      } while(
        tries < 20 && (
          (c>=2 && row[c-1] && row[c-1].color===color && row[c-2] && row[c-2].color===color) ||
          (r>=2 && board[r-1][c].color===color && board[r-2][c].color===color)
        )
      );
      row.push({ id:newId(), color });
    }
    board.push(row);
  }
  if(!hasAnyMove()) buildInitialBoard();
}

/* ---------------- Rendering the grid ---------------- */
function sizeBoard(){
  const wrap = document.querySelector('.board-wrap');
  const availW = wrap.clientWidth - 20;
  const availH = wrap.clientHeight - 20;
  cellSize = Math.floor(Math.min(availW/COLS, availH/ROWS, 62));
  const boardEl = document.getElementById('board');
  boardEl.style.width = (cellSize*COLS) + 'px';
  boardEl.style.height = (cellSize*ROWS) + 'px';
}

function posFor(r,c){
  const pad = cellSize*0.08;
  return { left: c*cellSize + pad/2, top: r*cellSize + pad/2, size: cellSize - pad };
}

function renderGrid(animate){
  const boardEl = document.getElementById('board');
  const seen = new Set();
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const cell = board[r][c];
      if(!cell) continue;
      seen.add(cell.id);
      const {left, top, size} = posFor(r,c);
      let el = domCache.get(cell.id);
      if(!el){
        el = document.createElement('div');
        el.className = `dot dot-${cell.color} new`;
        el.style.width = size+'px';
        el.style.height = size+'px';
        el.style.left = left+'px';
        el.style.top = (animate ? top - cellSize*2 : top)+'px';
        el.dataset.id = cell.id;
        el.addEventListener('click', () => onTileClickById(cell.id));
        boardEl.appendChild(el);
        domCache.set(cell.id, el);
        requestAnimationFrame(()=>{
          requestAnimationFrame(()=>{
            el.style.top = top+'px';
            el.classList.remove('new');
          });
        });
      } else {
        el.style.left = left+'px';
        el.style.top = top+'px';
      }
      el.dataset.r = r;
      el.dataset.c = c;
    }
  }
  // remove stale elements
  domCache.forEach((el, id) => {
    if(!seen.has(id)){
      el.remove();
      domCache.delete(id);
    }
  });
}

/* ---------------- Match detection ---------------- */
function findMatches(){
  const matched = new Set();
  for(let r=0;r<ROWS;r++){
    let c=0;
    while(c<COLS){
      const cell = board[r][c];
      if(!cell){ c++; continue; }
      let run=1;
      while(c+run<COLS && board[r][c+run] && board[r][c+run].color===cell.color) run++;
      if(run>=3){ for(let k=0;k<run;k++) matched.add(r+','+(c+k)); }
      c+=run;
    }
  }
  for(let c=0;c<COLS;c++){
    let r=0;
    while(r<ROWS){
      const cell = board[r][c];
      if(!cell){ r++; continue; }
      let run=1;
      while(r+run<ROWS && board[r+run][c] && board[r+run][c].color===cell.color) run++;
      if(run>=3){ for(let k=0;k<run;k++) matched.add((r+k)+','+c); }
      r+=run;
    }
  }
  return matched;
}

function hasAnyMove(){
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(c+1<COLS){
        swapCells(r,c,r,c+1);
        const m = findMatches();
        swapCells(r,c,r,c+1);
        if(m.size>0) return true;
      }
      if(r+1<ROWS){
        swapCells(r,c,r+1,c);
        const m = findMatches();
        swapCells(r,c,r+1,c);
        if(m.size>0) return true;
      }
    }
  }
  return false;
}

function swapCells(r1,c1,r2,c2){
  const tmp = board[r1][c1];
  board[r1][c1] = board[r2][c2];
  board[r2][c2] = tmp;
}

/* ---------------- Interaction ---------------- */
function onTileClickById(id){
  if(inputLocked) return;
  let coords = null;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(board[r][c] && board[r][c].id===id) coords = {r,c};
  if(!coords) return;
  handleTileClick(coords.r, coords.c);
}

async function handleTileClick(r,c){
  if(!selected){
    select(r,c);
    return;
  }
  if(selected.r===r && selected.c===c){
    deselect();
    return;
  }
  const isAdjacent = (Math.abs(selected.r-r)+Math.abs(selected.c-c))===1;
  if(!isAdjacent){
    deselect();
    select(r,c);
    return;
  }
  const a = selected, b = {r,c};
  deselect();
  inputLocked = true;
  swapCells(a.r,a.c,b.r,b.c);
  renderGrid(false);
  await wait(220);
  const matches = findMatches();
  if(matches.size===0){
    swapCells(a.r,a.c,b.r,b.c);
    renderGrid(false);
    await wait(220);
    inputLocked = false;
  } else {
    await resolveBoard();
    inputLocked = false;
  }
}

function select(r,c){
  selected = {r,c};
  const cell = board[r][c];
  const el = domCache.get(cell.id);
  if(el) el.classList.add('selected');
}
function deselect(){
  if(!selected) return;
  const cell = board[selected.r][selected.c];
  if(cell){
    const el = domCache.get(cell.id);
    if(el) el.classList.remove('selected');
  }
  selected = null;
}

/* ---------------- Resolve matches (with cascades) ---------------- */
async function resolveBoard(){
  let matches = findMatches();
  while(matches.size>0){
    const colorCounts = {};
    let comboCount = matches.size;
    matches.forEach(key => {
      const [r,c] = key.split(',').map(Number);
      const cell = board[r][c];
      if(cell){
        colorCounts[cell.color] = (colorCounts[cell.color]||0)+1;
        const el = domCache.get(cell.id);
        if(el) el.classList.add('pop');
      }
    });
    spawnScorePop(comboCount);
    await wait(260);

    matches.forEach(key => {
      const [r,c] = key.split(',').map(Number);
      board[r][c] = null;
    });

    applyFoodToFrogs(colorCounts);
    collapseBoard();
    renderGrid(true);
    await wait(320);

    matches = findMatches();
  }
  if(!hasAnyMove()){
    await wait(200);
    buildInitialBoard();
    renderGrid(true);
    await wait(320);
  }
}

function collapseBoard(){
  for(let c=0;c<COLS;c++){
    const survivors = [];
    for(let r=0;r<ROWS;r++){
      if(board[r][c]) survivors.push(board[r][c]);
    }
    const missing = ROWS - survivors.length;
    const fresh = [];
    for(let i=0;i<missing;i++) fresh.push(makeCell());
    const newColumn = fresh.concat(survivors);
    for(let r=0;r<ROWS;r++){
      board[r][c] = newColumn[r];
    }
  }
}

/* ---------------- Score popup ---------------- */
function spawnScorePop(count){
  const boardEl = document.getElementById('board');
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = '+' + (count*10);
  pop.style.left = (boardEl.clientWidth/2 - 14) + 'px';
  pop.style.top = (boardEl.clientHeight/2 - 10) + 'px';
  boardEl.appendChild(pop);
  setTimeout(()=>pop.remove(), 700);
  score += count*10;
}

/* ---------------- Frog feeding ---------------- */
function applyFoodToFrogs(colorCounts){
  Object.keys(colorCounts).forEach(colorIdxStr => {
    const colorIdx = Number(colorIdxStr);
    const slot = frogSlots[colorIdx];
    if(!slot || slot.celebrating) return;
    slot.fill = Math.min(100, slot.fill + colorCounts[colorIdx]*FILL_PER_DOT);
    updateBowl(colorIdx);
    if(slot.fill >= 100){
      celebrateFrog(colorIdx);
    }
  });
}

const CROAK_PHRASES = ['Ribbit~! 💕','Yum yum! 🍽️','So happy! ✨','Thank you! 🌸','Ribbit ribbit!'];

async function celebrateFrog(index){
  const slot = frogSlots[index];
  slot.celebrating = true;
  const holder = document.getElementById(`frog-holder-${index}`);
  const speech = document.getElementById(`speech-${index}`);
  holder.innerHTML = frogSVG(slot.color, 'happy') + speech.outerHTML;
  const newSpeech = document.getElementById(`speech-${index}`);
  newSpeech.textContent = CROAK_PHRASES[Math.floor(Math.random()*CROAK_PHRASES.length)];
  holder.classList.add('celebrate');
  requestAnimationFrame(()=> newSpeech.classList.add('show'));

  await wait(900);
  holder.classList.remove('celebrate');
  holder.classList.add('leaving');
  await wait(400);

  frogsFed++;
  document.getElementById('fed-val').textContent = frogsFed;
  slot.fill = 0;

  holder.classList.remove('leaving');
  holder.innerHTML = frogSVG(slot.color, 'idle') + `<div class="speech-bubble" id="speech-${index}"></div>`;
  holder.classList.add('entering');
  updateBowl(index);
  await wait(450);
  holder.classList.remove('entering');
  slot.celebrating = false;
}

/* ---------------- Timer ---------------- */
function startTimer(){
  secondsLeft = GAME_SECONDS;
  document.getElementById('timer-val').textContent = secondsLeft;
  document.getElementById('timer-pill').classList.remove('low-time');
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    secondsLeft--;
    document.getElementById('timer-val').textContent = Math.max(0,secondsLeft);
    if(secondsLeft<=10) document.getElementById('timer-pill').classList.add('low-time');
    if(secondsLeft<=0){
      clearInterval(timerInterval);
      endGame();
    }
  }, 1000);
}

/* ---------------- Game lifecycle ---------------- */
function startGame(){
  document.getElementById('gameover-overlay').classList.remove('active');
  document.getElementById('quit-overlay').classList.remove('active');
  showScreen('game-screen');

  score = 0;
  frogsFed = 0;
  document.getElementById('fed-val').textContent = 0;
  frogSlots = COLORS.map(c => ({ color:c, fill:0, celebrating:false }));

  domCache.forEach(el => el.remove());
  domCache.clear();

  renderFrogRow();
  buildInitialBoard();

  requestAnimationFrame(() => {
    sizeBoard();
    renderGrid(false);
    inputLocked = false;
    startTimer();
  });
}

function endGame(){
  inputLocked = true;
  deselect();
  let title = 'Nice try!';
  let msg = 'Every frog appreciates a snack 🌷';
  if(frogsFed>=8){ title='Amazing!'; msg='The whole pond is throwing a party! 🎉'; }
  else if(frogsFed>=4){ title='Great job!'; msg='So many happy, full froggies! 🐸💕'; }
  document.getElementById('go-title').textContent = title;
  document.getElementById('go-msg').textContent = msg;
  document.getElementById('go-fed').textContent = frogsFed;
  document.getElementById('go-score').textContent = score;
  document.getElementById('gameover-overlay').classList.add('active');
}

function requestQuit(){
  document.getElementById('quit-overlay').classList.add('active');
}
function closeQuit(){
  document.getElementById('quit-overlay').classList.remove('active');
}
function confirmQuit(){
  clearInterval(timerInterval);
  document.getElementById('quit-overlay').classList.remove('active');
  goToMenu();
}
function goToMenu(){
  document.getElementById('gameover-overlay').classList.remove('active');
  showScreen('menu-screen');
}

/* ---------------- Resize ---------------- */
window.addEventListener('resize', () => {
  if(document.getElementById('game-screen').classList.contains('active')){
    sizeBoard();
    renderGrid(false);
  }
});

/* ---------------- Init ---------------- */
buildLakeScene();
</script>
